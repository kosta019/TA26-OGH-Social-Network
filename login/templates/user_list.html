{% extends 'base.html' %}

{% block title %}ProgrammingDev - Posts{% endblock %}

{% block content %}
<body>
    <h1>Users:</h1>
    <ul>
        {% for user in users %}
            <li>Username: {{ user.username }}; Mail: {{ user.mail }}; Created: {{ user.created }}</li>
        {% empty %}
            <li>No users available.</li>
        {% endfor %}
    </ul>
</body>
</html>
{% endblock %}
